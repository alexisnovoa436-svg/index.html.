<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Carta de Perdón</title>

<style>
body{
    background: linear-gradient(135deg,#ff9a9e,#fad0c4);
    font-family: Arial, sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.carta{
    background:white;
    padding:40px;
    border-radius:15px;
    width:500px;
    box-shadow:0px 10px 25px rgba(0,0,0,0.2);
    text-align:center;
}

h1{
    color:#ff4b5c;
}

p{
    font-size:18px;
    line-height:1.6;
}

button{
    margin-top:20px;
    padding:10px 20px;
    border:none;
    border-radius:10px;
    background:#ff4b5c;
    color:white;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#e63946;
}

#mensaje{
    margin-top:20px;
    font-weight:bold;
    color:green;
}
</style>
</head>

<body>

<div class="carta">
<h1>Lo Siento 💔</h1>

<p>
Quiero pedirte perdón sinceramente.  
Sé que cometí errores y entiendo si estás molesta(o).  
Solo quiero que sepas que me importas mucho y que de verdad lamento lo ocurrido.  
Ojalá puedas perdonarme y podamos estar bien otra vez. 💙
</p>

<p>
Con cariño, <br>
<strong>Tu nombre</strong>
</p>

<button onclick="mostrarMensaje()">¿Me perdonas?</button>

<div id="mensaje"></div>

</div>

<script>
function mostrarMensaje(){
document.getElementById("mensaje").innerHTML = "❤️ Gracias por darme otra oportunidad ❤️";
}
</script>

</body>
</html>
