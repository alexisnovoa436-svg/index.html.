<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Pregunta divertida</title>
    <style>
        body {
            text-align: center;
            font-family: Arial, sans-serif;
            background-color: #f0f8ff;
            overflow: hidden;
        }
        h1 {
            margin-top: 50px;
        }
        button {
            padding: 15px 30px;
            font-size: 18px;
            margin: 20px;
            cursor: pointer;
            border-radius: 10px;
            border: none;
            position: absolute;
        }
        #si {
            background-color: #4CAF50;
            color: white;
            left: 40%;
            top: 200px;
        }
        #no {
            background-color: #f44336;
            color: white;
            left: 55%;
            top: 200px;
        }
        img {
            margin-top: 30px;
            width: 300px;
            display: none;
            position: relative;
            top: 250px;
        }
    </style>
</head>
<body>

    <h1>¿Quieres hacer el amor?</h1>

    <button id="si" onclick="respuestaSi()">Sí</button>
    <button id="no" onmouseover="moverNo()">No</button>

    <div>
        <img id="bob" src="https://i.imgur.com/5cX1F5R.png" alt="Bob Esponja festejando">
        <img id="stitch" src="https://i.imgur.com/2rmFJpE.png" alt="Stitch enojado">
    </div>

    <script>
        function respuestaSi() {
            document.getElementById("bob").style.display = "block";
            document.getElementById("stitch").style.display = "none";
        }

        function moverNo() {
            var botonNo = document.getElementById("no");
            var ancho = window.innerWidth - 100;
            var alto = window.innerHeight - 100;

            var nuevaX = Math.random() * ancho;
            var nuevaY = Math.random() * alto;

            botonNo.style.left = nuevaX + "px";
            botonNo.style.top = nuevaY + "px";
        }
    </script>

</body>
</html>
